<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="60%" stop-color="#06061a"/>
      <stop offset="100%" stop-color="#000008"/>
    </radialGradient>
    <radialGradient id="planetGrad" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="40%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1e0550"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="marsGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur16"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="1200" height="675"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="1200" height="675" fill="url(#bg)"/>

    <!-- Nebula glow center -->
    <ellipse cx="600" cy="338" rx="420" ry="280" fill="url(#glowCenter)" filter="url(#blur16)"/>

    <!-- Stars layer 1 — tiny -->
    <g fill="white" opacity="0.7">
      <circle cx="42" cy="28" r="0.8"/><circle cx="118" cy="61" r="0.6"/><circle cx="204" cy="19" r="0.9"/>
      <circle cx="287" cy="44" r="0.7"/><circle cx="365" cy="12" r="1.0"/><circle cx="441" cy="72" r="0.6"/>
      <circle cx="523" cy="31" r="0.8"/><circle cx="612" cy="18" r="0.7"/><circle cx="698" cy="55" r="0.9"/>
      <circle cx="774" cy="22" r="0.6"/><circle cx="852" cy="48" r="1.0"/><circle cx="931" cy="15" r="0.7"/>
      <circle cx="1014" cy="67" r="0.8"/><circle cx="1089" cy="33" r="0.6"/><circle cx="1158" cy="52" r="0.9"/>
      <circle cx="76" cy="108" r="0.7"/><circle cx="153" cy="142" r="0.9"/><circle cx="241" cy="118" r="0.6"/>
      <circle cx="319" cy="155" r="0.8"/><circle cx="488" cy="131" r="0.7"/><circle cx="567" cy="98" r="1.0"/>
      <circle cx="645" cy="142" r="0.6"/><circle cx="723" cy="108" r="0.8"/><circle cx="801" cy="163" r="0.7"/>
      <circle cx="879" cy="122" r="0.9"/><circle cx="957" cy="148" r="0.6"/><circle cx="1036" cy="115" r="0.8"/>
      <circle cx="1112" cy="159" r="0.7"/><circle cx="1182" cy="128" r="0.9"/>
      <circle cx="28" cy="218" r="0.8"/><circle cx="97" cy="248" r="0.6"/><circle cx="172" cy="204" r="0.9"/>
      <circle cx="254" cy="269" r="0.7"/><circle cx="338" cy="231" r="0.8"/><circle cx="420" cy="258" r="0.6"/>
      <circle cx="505" cy="216" r="1.0"/><circle cx="720" cy="228" r="0.7"/><circle cx="808" cy="262" r="0.9"/>
      <circle cx="894" cy="218" r="0.6"/><circle cx="980" cy="247" r="0.8"/><circle cx="1063" cy="212" r="0.7"/>
      <circle cx="1141" cy="254" r="0.9"/><circle cx="1193" cy="230" r="0.6"/>
      <circle cx="55" cy="342" r="0.8"/><circle cx="134" cy="378" r="0.7"/><circle cx="218" cy="354" r="0.9"/>
      <circle cx="302" cy="391" r="0.6"/><circle cx="386" cy="362" r="0.8"/><circle cx="468" cy="398" r="0.7"/>
      <circle cx="720" cy="368" r="0.8"/><circle cx="808" cy="402" r="0.6"/><circle cx="898" cy="356" r="0.9"/>
      <circle cx="986" cy="388" r="0.7"/><circle cx="1072" cy="364" r="0.8"/><circle cx="1155" cy="394" r="0.6"/>
      <circle cx="38" cy="468" r="0.7"/><circle cx="116" cy="492" r="0.9"/><circle cx="198" cy="458" r="0.6"/>
      <circle cx="280" cy="508" r="0.8"/><circle cx="362" cy="474" r="0.7"/><circle cx="444" cy="512" r="0.9"/>
      <circle cx="526" cy="480" r="0.6"/><circle cx="608" cy="506" r="0.8"/><circle cx="688" cy="462" r="0.7"/>
      <circle cx="768" cy="498" r="0.9"/><circle cx="848" cy="466" r="0.6"/><circle cx="930" cy="494" r="0.8"/>
      <circle cx="1012" cy="470" r="0.7"/><circle cx="1092" cy="508" r="0.9"/><circle cx="1170" cy="482" r="0.6"/>
      <circle cx="62" cy="572" r="0.8"/><circle cx="142" cy="604" r="0.7"/><circle cx="224" cy="580" r="0.9"/>
      <circle cx="308" cy="618" r="0.6"/><circle cx="392" cy="592" r="0.8"/><circle cx="476" cy="628" r="0.7"/>
      <circle cx="558" cy="598" r="0.9"/><circle cx="640" cy="624" r="0.6"/><circle cx="720" cy="588" r="0.8"/>
      <circle cx="802" cy="614" r="0.7"/><circle cx="884" cy="572" r="0.9"/><circle cx="966" cy="608" r="0.6"/>
      <circle cx="1048" cy="582" r="0.8"/><circle cx="1128" cy="618" r="0.7"/><circle cx="1192" cy="596" r="0.9"/>
    </g>

    <!-- Stars layer 2 — slightly brighter -->
    <g fill="white" opacity="0.9">
      <circle cx="88" cy="74" r="1.2"/><circle cx="332" cy="88" r="1.4"/><circle cx="590" cy="64" r="1.1"/>
      <circle cx="840" cy="91" r="1.3"/><circle cx="1098" cy="78" r="1.2"/>
      <circle cx="164" cy="308" r="1.3"/><circle cx="416" cy="320" r="1.1"/><circle cx="1002" cy="314" r="1.4"/>
      <circle cx="1148" cy="302" r="1.2"/>
      <circle cx="74" cy="538" r="1.1"/><circle cx="320" cy="552" r="1.3"/><circle cx="916" cy="544" r="1.2"/>
      <circle cx="1108" cy="526" r="1.4"/>
    </g>

    <!-- Twinkle stars — bright with glow -->
    <g filter="url(#glow)">
      <circle cx="178" cy="52" r="1.8" fill="white" opacity="0.95"/>
      <circle cx="962" cy="88" r="2.0" fill="white" opacity="0.9"/>
      <circle cx="68" cy="432" r="1.7" fill="white" opacity="0.95"/>
      <circle cx="1138" cy="448" r="1.9" fill="white" opacity="0.9"/>
      <circle cx="488" cy="584" r="1.8" fill="#c4b5fd" opacity="0.95"/>
      <circle cx="758" cy="44" r="2.1" fill="#c4b5fd" opacity="0.9"/>
    </g>

    <!-- Orbit ring 1 — main planet orbit -->
    <ellipse cx="600" cy="340" rx="420" ry="90" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="6 5" opacity="0.22"/>
    <!-- Orbit ring 2 -->
    <ellipse cx="600" cy="340" rx="320" ry="68" fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.18"/>
    <!-- Orbit ring 3 outer -->
    <ellipse cx="600" cy="340" rx="530" ry="115" fill="none" stroke="#6d28d9" stroke-width="0.8" stroke-dasharray="8 8" opacity="0.14"/>

    <!-- Mars (red planet, upper right) -->
    <circle cx="940" cy="155" r="44" fill="url(#marsGlow)" filter="url(#blur16)"/>
    <circle cx="940" cy="155" r="28" fill="#c2410c"/>
    <circle cx="940" cy="155" r="28" fill="none" stroke="#f97316" stroke-width="1" opacity="0.4"/>
    <!-- Mars surface details -->
    <circle cx="932" cy="148" r="5" fill="#9a3412" opacity="0.6"/>
    <circle cx="948" cy="162" r="3.5" fill="#9a3412" opacity="0.5"/>
    <circle cx="935" cy="164" r="2.5" fill="#7c2d12" opacity="0.7"/>
    <!-- Mars atmosphere glow -->
    <circle cx="940" cy="155" r="32" fill="none" stroke="#f97316" stroke-width="3" opacity="0.12" filter="url(#blur4)"/>

    <!-- Main planet (purple) -->
    <circle cx="380" cy="340" rx="102" ry="102" r="102" fill="#1e0550" filter="url(#blur8)" opacity="0.6"/>
    <circle cx="380" cy="340" r="96" fill="url(#planetGrad)"/>
    <!-- Planet surface texture -->
    <ellipse cx="360" cy="318" rx="28" ry="16" fill="#6d28d9" opacity="0.35" transform="rotate(-20,360,318)"/>
    <ellipse cx="400" cy="352" rx="20" ry="10" fill="#4c1d95" opacity="0.4" transform="rotate(15,400,352)"/>
    <ellipse cx="375" cy="365" rx="14" ry="7" fill="#7c3aed" opacity="0.3" transform="rotate(-10,375,365)"/>
    <!-- Planet shine -->
    <ellipse cx="354" cy="310" rx="30" ry="20" fill="white" opacity="0.08"/>
    <!-- Planet glow -->
    <circle cx="380" cy="340" r="108" fill="none" stroke="#a78bfa" stroke-width="6" opacity="0.12" filter="url(#blur8)"/>

    <!-- Planet ring -->
    <ellipse cx="380" cy="344" rx="148" ry="28" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.35"/>
    <ellipse cx="380" cy="344" rx="136" ry="22" fill="none" stroke="#c4b5fd" stroke-width="1" opacity="0.2"/>
    <!-- Ring occlusion (back half hidden by planet) -->
    <ellipse cx="380" cy="344" rx="148" ry="28" fill="url(#bg)" opacity="0" stroke="none"/>
    <path d="M 234 340 Q 307 362 380 364 Q 453 362 526 340" fill="#06061a" opacity="0.85"/>

    <!-- Satellite dot on orbit ring 1 -->
    <circle cx="980" cy="308" r="5" fill="#a78bfa" opacity="0.9" filter="url(#glow)"/>
    <circle cx="980" cy="308" r="9" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.4"/>
    <!-- Satellite dot 2 -->
    <circle cx="222" cy="374" r="3.5" fill="#c4b5fd" opacity="0.85" filter="url(#glow)"/>

    <!-- Connection line: planet to satellite -->
    <line x1="478" y1="330" x2="975" y2="310" stroke="#7c3aed" stroke-width="0.6" stroke-dasharray="4 6" opacity="0.25"/>

    <!-- UI overlay — dashboard card top left -->
    <rect x="52" y="48" width="188" height="76" rx="12" fill="#0d0d2b" fill-opacity="0.82" stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="68" y="74" font-family="monospace" font-size="9" fill="#a78bfa" opacity="0.7" letter-spacing="1">MISSION STATUS</text>
    <text x="68" y="94" font-family="monospace" font-size="14" fill="#c4b5fd" font-weight="bold">ACTIVE</text>
    <circle cx="158" cy="91" r="5" fill="#22c55e" opacity="0.9"/>
    <circle cx="158" cy="91" r="8" fill="#22c55e" opacity="0.2"/>
    <text x="68" y="112" font-family="monospace" font-size="8" fill="#6d6d8a" opacity="0.8">SOL 247 · MARS BASE ALPHA</text>

    <!-- UI card — delay indicator -->
    <rect x="960" y="48" width="188" height="76" rx="12" fill="#0d0d2b" fill-opacity="0.82" stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="976" y="74" font-family="monospace" font-size="9" fill="#a78bfa" opacity="0.7" letter-spacing="1">SIGNAL DELAY</text>
    <text x="976" y="96" font-family="monospace" font-size="18" fill="#f97316" font-weight="bold">22:14</text>
    <text x="1076" y="96" font-family="monospace" font-size="9" fill="#6d6d8a">min</text>
    <text x="976" y="112" font-family="monospace" font-size="8" fill="#6d6d8a" opacity="0.8">EARTH ←→ MARS</text>

    <!-- UI card — crew vitals bottom left -->
    <rect x="52" y="556" width="220" height="80" rx="12" fill="#0d0d2b" fill-opacity="0.82" stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="68" y="580" font-family="monospace" font-size="9" fill="#a78bfa" opacity="0.7" letter-spacing="1">CREW STATUS</text>
    <circle cx="72" cy="602" r="6" fill="#4ade80" opacity="0.9"/>
    <text x="84" y="607" font-family="monospace" font-size="9" fill="#d1d5db">CDR Santos — OK</text>
    <circle cx="72" cy="620" r="6" fill="#4ade80" opacity="0.9"/>
    <text x="84" y="625" font-family="monospace" font-size="9" fill="#d1d5db">ENG Kowalski — OK</text>

    <!-- UI card — alerts bottom right -->
    <rect x="928" y="556" width="220" height="80" rx="12" fill="#0d0d2b" fill-opacity="0.82" stroke="#ef4444" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="944" y="580" font-family="monospace" font-size="9" fill="#f87171" opacity="0.7" letter-spacing="1">ACTIVE ALERTS</text>
    <rect x="944" y="590" width="6" height="6" rx="1" fill="#f97316"/>
    <text x="956" y="599" font-family="monospace" font-size="8" fill="#d1d5db">O₂ pressure nominal</text>
    <rect x="944" y="608" width="6" height="6" rx="1" fill="#facc15"/>
    <text x="956" y="617" font-family="monospace" font-size="8" fill="#d1d5db">Solar panel output low</text>

    <!-- Center title -->
    <text x="600" y="292" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa" opacity="0.6" letter-spacing="4">MISSION CONTROL SYSTEM</text>
    <text x="600" y="338" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="72" fill="white" font-weight="900" letter-spacing="-2" opacity="0.96">ORBIT</text>
    <!-- Title glow -->
    <text x="600" y="338" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="72" fill="#a78bfa" font-weight="900" letter-spacing="-2" opacity="0.18" filter="url(#blur8)">ORBIT</text>
    <text x="600" y="368" text-anchor="middle" font-family="monospace" font-size="13" fill="#c4b5fd" opacity="0.55" letter-spacing="3">MARS MISSION · FIAP 2026</text>

    <!-- Scanline overlay subtle -->
    <rect width="1200" height="675" fill="url(#bg)" opacity="0.06"/>
  </g>
</svg>
